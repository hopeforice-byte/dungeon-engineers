<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Инженеры Подземелий — Выбор режима</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #0f0f0f 100%);
            font-family: 'Share Tech Mono', 'Inter', monospace;
            color: #ccc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        @keyframes pageSlideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        @keyframes menuFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        @keyframes buttonPress {
            0% { transform: scale(1); }
            50% { transform: scale(0.96); }
            100% { transform: scale(1); }
        }
        
        .main-menu {
            max-width: 1200px;
            width: 100%;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 50px;
            animation: menuFadeIn 0.5s ease-out;
        }
        
        .logo { text-align: center; }
        
        .logo h1 {
            color: #f0a500;
            font-size: 3rem;
            letter-spacing: 6px;
        }
        
        .logo .subtitle {
            color: #888;
            font-size: 0.8rem;
            margin-top: 8px;
            letter-spacing: 2px;
        }
        
        .menu-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
        }
        
        .menu-card {
            background: linear-gradient(135deg, #151515 0%, #111111 100%);
            border: 2px solid #2a2a2a;
            border-radius: 28px;
            padding: 50px 60px;
            text-align: center;
            cursor: pointer;
            min-width: 280px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .menu-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(240,165,0,0.08), transparent);
            transition: left 0.6s ease;
        }
        
        .menu-card:hover::before { left: 100%; }
        
        .menu-card:hover {
            border-color: #f0a500;
            transform: translateY(-5px);
        }
        
        .menu-card:active {
            animation: buttonPress 0.15s ease-out;
        }
        
        .menu-card .icon {
            font-size: 5rem;
            margin-bottom: 20px;
            display: inline-block;
        }
        
        .menu-card h2 {
            color: #f0a500;
            margin-bottom: 12px;
            font-size: 1.8rem;
        }
        
        .menu-card p {
            color: #888;
            font-size: 0.85rem;
            line-height: 1.5;
        }
        
        .badge {
            display: inline-block;
            background: #2a2a2a;
            color: #888;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 20px;
            margin-top: 12px;
        }
        
        footer {
            margin-top: 60px;
            text-align: center;
            color: #555;
            font-size: 0.7rem;
        }
        
        @media (max-width: 768px) {
            .menu-card { padding: 30px 40px; }
            .logo h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="main-menu">
        <div class="logo">
            <h1>⚙️ ИНЖЕНЕРЫ ПОДЗЕМЕЛИЙ</h1>
            <div class="subtitle">постапокалиптическая ролевая игра</div>
        </div>
        
        <div class="menu-buttons">
            <div class="menu-card" onclick="navigateTo('character.html')">
                <div class="icon">👤</div>
                <h2>Персонаж</h2>
                <p>Создание и управление<br>человеком, мутантом или существом</p>
                <div class="badge">9 рас | 7 классов</div>
            </div>
            
            <div class="menu-card" onclick="navigateTo('mech.html')">
                <div class="icon">🤖</div>
                <h2>Мех</h2>
                <p>Создание и управление<br>боевой машиной</p>
                <div class="badge">8 шасси | 40+ вооружений</div>
            </div>
        </div>
        
        <footer>Dungeon Engineers — версия 1.0</footer>
    </div>
    
    <script>
        function navigateTo(url) {
            const menu = document.querySelector('.main-menu');
            menu.style.animation = 'pageSlideIn 0.3s reverse';
            setTimeout(() => { window.location.href = url; }, 200);
        }
    </script>
</body>
</html>
